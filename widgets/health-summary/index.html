<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <title>Health Summary</title>

    <link
      rel="stylesheet"
      href="../../css/system/cozy-autumn.css"
    />

    <link
      rel="stylesheet"
      href="../../css/system/base.css"
    />

    <link
      rel="stylesheet"
      href="../../css/system/components.css"
    />

    <link
      rel="stylesheet"
      href="../../css/widgets/health-summary.css"
    />
  </head>

  <body>
    <main class="widget-shell">
      <button
        class="widget-card health-card"
        id="health-card"
        type="button"
      >
        <header class="widget-header">
          <div class="widget-heading">
            <span
              class="widget-icon"
              aria-hidden="true"
            >
              ♥
            </span>

            <div>
              <p class="widget-eyebrow">
                Dashboard
              </p>

              <h1 class="widget-title">
                Health
              </h1>
            </div>
          </div>

          <span
            class="widget-arrow"
            aria-hidden="true"
          >
            →
          </span>
        </header>

        <div
          class="widget-loading"
          id="health-loading"
        >
          Loading your health summary…
        </div>

        <div
          class="widget-error"
          id="health-error"
          hidden
        >
          Health data could not be loaded.
        </div>

        <div
          id="health-content"
          hidden
        >
          <div class="health-metrics">
            <section class="widget-panel">
              <div class="metric-heading">
                <span
                  class="health-metric-icon"
                  aria-hidden="true"
                >
                  💧
                </span>

                <p class="metric-label">
                  Water
                </p>
              </div>

              <p class="metric-value">
                <span id="water-today">0</span>

                <span class="metric-goal">
                  / <span id="water-goal">72</span> oz
                </span>
              </p>

              <div class="progress">
                <div class="progress-track">
                  <div
                    class="progress-fill health-progress--water"
                    id="water-progress"
                  ></div>
                </div>

                <span
                  class="progress-percent"
                  id="water-percent"
                >
                  0%
                </span>
              </div>
            </section>

            <section class="widget-panel">
              <div class="metric-heading">
                <span
                  class="health-metric-icon"
                  aria-hidden="true"
                >
                  🚶
                </span>

                <p class="metric-label">
                  Walking
                </p>
              </div>

              <div class="walking-values">
                <p class="metric-value">
                  <span id="walking-today">0</span>

                  <span class="metric-goal">
                    / <span id="walking-goal">2</span> mi
                  </span>
                </p>

                <div class="week-total">
                  <span
                    class="week-total__value"
                    id="walking-week-total"
                  >
                    0
                  </span>

                  <span class="week-total__label">
                    mi this week
                  </span>
                </div>
              </div>

              <div class="progress">
                <div class="progress-track">
                  <div
                    class="progress-fill health-progress--walking"
                    id="walking-progress"
                  ></div>
                </div>

                <span
                  class="progress-percent"
                  id="walking-percent"
                >
                  0%
                </span>
              </div>
            </section>
          </div>

          <footer class="progress-summary">
            <span
              class="progress-summary__badge"
              aria-hidden="true"
            >
              ↓
            </span>

            <span
              class="progress-summary__value"
              id="pounds-down"
            >
              0
            </span>

            <span class="progress-summary__unit">
              lb down overall
            </span>
          </footer>
        </div>
      </button>
    </main>

    <script src="../../js/health-summary-widget.js"></script>
  </body>
</html>
