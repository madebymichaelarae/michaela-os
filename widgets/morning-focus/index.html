<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <title>Morning Focus</title>

    <link
      rel="stylesheet"
      href="../../css/system/cozy-autumn.css"
    />

    <link
      rel="stylesheet"
      href="../../css/morning-focus-widget.css"
    />
  </head>

  <body>
    <main class="focus-widget-shell">
      <article
        class="focus-card"
        id="focusCard"
      >
        <header class="focus-header">
          <div class="focus-heading">
            <span
              class="focus-header__icon"
              aria-hidden="true"
            >
              ☀
            </span>

            <div>
              <p class="focus-eyebrow">
                Today
              </p>

              <h1 class="focus-title">
                Morning Focus
              </h1>
            </div>
          </div>

          <a
            class="focus-open-link"
            id="openFocusLink"
            href="#"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Open Morning Focus dashboard"
            hidden
          >
            <span aria-hidden="true">→</span>
          </a>
        </header>

        <section
          class="focus-loading"
          id="loadingState"
        >
          Loading today’s focus…
        </section>

        <section
          class="focus-empty"
          id="emptyState"
          hidden
        >
          <div class="focus-empty__copy">
            <p class="focus-empty__title">
              Your morning focus is ready to begin.
            </p>

            <p class="focus-empty__description">
              Create today’s priorities and reflections.
            </p>
          </div>

          <button
            class="focus-create-button"
            id="createFocusButton"
            type="button"
          >
            Start Today
          </button>

          <p
            class="focus-message"
            id="createMessage"
            aria-live="polite"
          ></p>
        </section>

        <section
          class="focus-content"
          id="focusContent"
          hidden
        >
          <section class="priority-panel">
            <div class="panel-heading">
              <span
                class="panel-heading__icon"
                aria-hidden="true"
              >
                ✓
              </span>

              <p class="panel-heading__label">
                Today’s priorities
              </p>
            </div>

            <div class="priority-list">
              <label class="priority-item">
                <input
                  type="checkbox"
                  id="priority1Done"
                />

                <span id="priority1Text"></span>
              </label>

              <label class="priority-item">
                <input
                  type="checkbox"
                  id="priority2Done"
                />

                <span id="priority2Text"></span>
              </label>

              <label class="priority-item">
                <input
                  type="checkbox"
                  id="priority3Done"
                />

                <span id="priority3Text"></span>
              </label>
            </div>
          </section>

          <section class="reflection-panel">
            <article class="reflection-item">
              <p class="reflection-label">
                Looking forward to
              </p>

              <p
                class="reflection-value"
                id="lookingForwardTo"
              ></p>
            </article>

            <article class="reflection-item">
              <p class="reflection-label">
                Leaving in yesterday
              </p>

              <p
                class="reflection-value"
                id="leavingInYesterday"
              ></p>
            </article>

            <article class="reflection-item">
              <p class="reflection-label">
                Grateful for
              </p>

              <p
                class="reflection-value"
                id="gratefulFor"
              ></p>
            </article>
          </section>

          <p
            class="focus-message focus-message--update"
            id="updateMessage"
            aria-live="polite"
          ></p>
        </section>

        <section
          class="focus-error"
          id="errorState"
          hidden
        >
          Morning Focus could not be loaded.
        </section>
      </article>
    </main>

    <script src="../../js/morning-focus-widget.js"></script>
  </body>
</html>
