<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Weight Tracker | Michaela OS</title>

    <link rel="stylesheet" href="/css/styles.css">
</head>

<body class="widget-page theme-weight">
    <main class="widget-shell">
        <article class="tracker-card">
            <header class="tracker-header">
                <span
                    class="tracker-icon"
                    aria-hidden="true"
                >
                    ⚖️
                </span>

                <div>
                    <p class="tracker-eyebrow">Health</p>

                    <h1 class="tracker-title">
                        Weightloss Tracker
                    </h1>
                </div>
            </header>

            <section
                class="tracker-stats"
                aria-label="Weight summary"
            >
                <article class="tracker-stat">
                    <p class="tracker-stat-label">
                        Current weight
                    </p>

                    <p class="tracker-stat-value">
                        <span id="currentWeight">—</span>
                    </p>
                </article>

                <article class="tracker-stat">
                    <p class="tracker-stat-label">
                        Overall change
                    </p>

                    <p
                        id="weightChange"
                        class="tracker-stat-value tracker-stat-value-small"
                    >
                        Calculating…
                    </p>
                </article>

                <article class="tracker-stat">
                    <p class="tracker-stat-label">
                        Recognition
                    </p>

                    <p
                        id="weightRecognition"
                        class="tracker-stat-value tracker-stat-value-small"
                    >
                        Checking progress…
                    </p>
                </article>
            </section>

            <section
                class="tracker-goal"
                aria-labelledby="weightGoalLabel"
            >
                <div class="tracker-goal-header">
                    <p id="weightGoalLabel">
                        Goal 1
                    </p>

                    <p id="weightGoalRemaining">
                        Calculating goal…
                    </p>
                </div>

                <div
                    class="tracker-progress-track"
                    role="progressbar"
                    aria-label="Progress toward 200 pound goal"
                    aria-valuemin="0"
                    aria-valuemax="100"
                    aria-valuenow="0"
                >
                    <div
                        id="weightProgressBar"
                        class="tracker-progress-bar"
                    ></div>
                </div>

                <div class="tracker-goal-footer">
                    <p id="weightGoalDetails">
                        Loading progress…
                    </p>

                    <p id="weightUpdated">
                        Loading latest entry…
                    </p>
                </div>
            </section>

            <section class="tracker-chart-panel">
                <div class="chart-container">
                    <canvas
                        id="weightChart"
                        role="img"
                        aria-label="Line chart showing weight measurements over time."
                    ></canvas>
                </div>
            </section>
        </article>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/js/weight-chart.js"></script>
</body>

</html>
