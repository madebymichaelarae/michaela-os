<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Water Tracker | Michaela OS</title>

    <link rel="stylesheet" href="/css/styles.css">
</head>

<body class="widget-page theme-water">
    <main class="widget-shell">
        <article class="tracker-card">
            <header class="tracker-header">
                <span
                    class="tracker-icon"
                    aria-hidden="true"
                >
                    💧
                </span>

                <div>
                    <p class="tracker-eyebrow">Health</p>

                    <h1 class="tracker-title">
                        Water Tracker
                    </h1>
                </div>
            </header>

            <section
                class="tracker-stats"
                aria-label="Today's water summary"
            >
                <article class="tracker-stat">
                    <p class="tracker-stat-label">
                        Today’s water
                    </p>

                    <p class="tracker-stat-value">
                        <span id="waterCurrent">—</span>
                    </p>
                </article>

                <article class="tracker-stat">
                    <p class="tracker-stat-label">
                        Remaining
                    </p>

                    <p
                        id="waterRemaining"
                        class="tracker-stat-value tracker-stat-value-small"
                    >
                        Calculating…
                    </p>
                </article>

                <article class="tracker-stat">
                    <p class="tracker-stat-label">
                        Recognition
                    </p>

                    <p
                        id="waterRecognition"
                        class="tracker-stat-value tracker-stat-value-small"
                    >
                        Checking progress…
                    </p>
                </article>
            </section>

            <section
                class="tracker-goal"
                aria-labelledby="waterGoalLabel"
            >
                <div class="tracker-goal-header">
                    <p id="waterGoalLabel">
                        Daily Goal
                    </p>

                    <p id="waterGoalProgress">
                        Calculating goal…
                    </p>
                </div>

                <div
                    class="tracker-progress-track"
                    role="progressbar"
                    aria-label="Progress toward 72 ounce water goal"
                    aria-valuemin="0"
                    aria-valuemax="100"
                    aria-valuenow="0"
                >
                    <div
                        id="waterProgressBar"
                        class="tracker-progress-bar"
                    ></div>
                </div>

              <div class="tracker-goal-footer">
    <p id="waterPercentage">
        Loading progress…
    </p>

    <p id="waterGoalProgress">
        Loading progress…
    </p>
</div>
                </div>
            </section>

            <section
                class="tracker-stats"
                aria-label="Water goal history"
            >
                <article class="tracker-stat">
                    <p class="tracker-stat-label">
                        This week
                    </p>

                    <p
                        id="waterWeekGoalCount"
                        class="tracker-stat-value tracker-stat-value-small"
                    >
                        Calculating…
                    </p>
                </article>

                <article class="tracker-stat">
                    <p class="tracker-stat-label">
                        This month
                    </p>

                    <p
                        id="waterMonthGoalCount"
                        class="tracker-stat-value tracker-stat-value-small"
                    >
                        Calculating…
                    </p>
                </article>

                <article class="tracker-stat">
                    <p class="tracker-stat-label">
                        Current streak
                    </p>

                    <p
                        id="waterCurrentStreak"
                        class="tracker-stat-value tracker-stat-value-small"
                    >
                        Calculating…
                    </p>
                </article>
            </section>
        </article>
    </main>

    <script src="/js/water-chart.js"></script>
</body>

</html>
