<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Water Tracker</title>

    <link
        rel="stylesheet"
        href="../../css/styles.css">
</head>

<body class="widget-page theme-water">

<div class="tracker-card water-card">

    <div class="tracker-header">
        <div>
            <h1>💧 Water</h1>
            <p>Today’s hydration progress.</p>
        </div>
    </div>

    <div class="tracker-stats">

        <div class="tracker-stat">
            <span class="tracker-label">
                Today’s Water
            </span>

            <span
                class="tracker-value"
                id="waterCurrent">
                0 oz
            </span>
        </div>

        <div class="tracker-stat">
            <span class="tracker-label">
                Remaining
            </span>

            <span
                class="tracker-value"
                id="waterRemaining">
                72 oz
            </span>
        </div>

        <div class="tracker-stat">
            <span class="tracker-label">
                Recognition
            </span>

            <span
                class="tracker-value"
                id="waterRecognition">
                🥤 Time for some water!
            </span>
        </div>

    </div>

    <div class="tracker-goal">

        <div class="tracker-goal-header">
            <span id="waterGoalLabel">
                Daily Goal: 72 oz
            </span>

            <span id="waterGoalProgress">
                0 / 72 oz
            </span>
        </div>

        <div
            class="tracker-progress-track"
            role="progressbar"
            aria-valuemin="0"
            aria-valuemax="100"
            aria-valuenow="0"
            aria-label="Progress toward daily water goal">

            <div
                class="tracker-progress-fill"
                id="waterProgressBar">
            </div>

        </div>

        <div
            class="tracker-goal-details"
            id="waterPercentage">
            0% complete
        </div>

    </div>

    <div class="water-history-section">

        <div class="water-history-heading">
            <h2>Goal History</h2>
            <p>Days you reached your daily water goal.</p>
        </div>

        <div class="tracker-stats">

            <div class="tracker-stat">
                <span class="tracker-label">
                    This Week
                </span>

                <span
                    class="tracker-value"
                    id="waterWeekGoalCount">
                    0 / 7 days
                </span>
            </div>

            <div class="tracker-stat">
                <span class="tracker-label">
                    This Month
                </span>

                <span
                    class="tracker-value"
                    id="waterMonthGoalCount">
                    0 days
                </span>
            </div>

            <div class="tracker-stat">
                <span class="tracker-label">
                    Current Streak
                </span>

                <span
                    class="tracker-value"
                    id="waterCurrentStreak">
                    0 days
                </span>
            </div>

        </div>

    </div>

</div>

<script src="../../js/water-chart.js"></script>

</body>
</html>
