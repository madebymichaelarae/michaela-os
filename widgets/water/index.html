<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Tracker</title>

    <link rel="stylesheet" href="../../css/styles.css">
</head>

<body class="widget-page theme-water">

<div class="tracker-card">

    <div class="tracker-header">
        <h1>💧 Water</h1>
        <p>Your hydration progress.</p>
    </div>

    <div class="tracker-stats">

        <div class="tracker-stat">
            <span class="tracker-label">Today's Water</span>
            <span class="tracker-value" id="waterCurrent">-- oz</span>
        </div>

        <div class="tracker-stat">
            <span class="tracker-label">7-Day Average</span>
            <span class="tracker-value" id="waterAverage">-- oz</span>
        </div>

        <div class="tracker-stat">
            <span class="tracker-label">Recognition</span>
            <span class="tracker-value" id="waterRecognition">💧 Keep drinking!</span>
        </div>

    </div>

    <div class="tracker-goal">

        <div class="tracker-goal-header">
            <span id="waterGoalLabel">Daily Goal</span>
            <span id="waterGoalRemaining">0 / 72 oz</span>
        </div>

        <div
            class="tracker-progress-track"
            role="progressbar"
            aria-valuemin="0"
            aria-valuemax="100"
            aria-valuenow="0">

            <div
                id="waterProgressBar"
                class="tracker-progress-fill">
            </div>

        </div>

        <div
            class="tracker-goal-details"
            id="waterGoalDetails">
            0% complete
        </div>

    </div>

    <div class="tracker-chart-panel">
        <canvas id="waterChart"></canvas>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="../../js/water-chart.js"></script>

</body>
</html>
